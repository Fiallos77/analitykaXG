<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description }}">
    <title>{{ page.title }} | analitykaXG</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="container">
            <nav>
                <div class="nav-left">
                    <a href="{{ site.baseurl }}/" class="back-button">
                        <span>←</span>
                        <span>Back</span>
                    </a>
                    
                    <a href="{{ site.baseurl }}/" class="logo-container">
                        <img src="{{ site.baseurl }}/assets/images/logo.png" alt="analitykaXG" class="logo-small">
                        <div class="logo-text-small">
                            ANALITYKA<span class="highlight">XG</span>
                        </div>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <!-- REPORT CONTENT -->
    <div class="container">
        {{ content }}
    </div>

    <!-- FOOTER CTA -->
    <div class="report-cta">
        <div class="container">
            <h3>Need custom analysis?</h3>
            <p>Match analysis for clubs, scouts and agencies.</p>
            <a href="mailto:analitykaxg@gmail.com" class="cta-button">
                Request Analysis
                <span>→</span>
            </a>
        </div>
    </div>
</body>
</html>
